name: CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libcriterion-dev libconfig++-dev

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cmake-${{ runner.os }}-

      - name: Build
        run: cmake -B build && cmake --build build

      - name: Check binary exists
        run: test -f ./raytracer

  tests:
    name: Criterion Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libcriterion-dev libconfig++-dev

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cmake-${{ runner.os }}-

      - name: Build and run tests
        run: cmake -B build && cmake --build build --target tests_run

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/results/
          if-no-files-found: ignore
