name: Sync to Epitech

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    name: mirror/main → Epitech
    if: github.repository != 'EpitechPGE2-2025/G-OOP-400-MPL-4-1-raytracer-1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SSH for Epitech
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EPITECH_SSH_KEY }}

      - name: Add Epitech remote
        run: |
          git remote add epitech git@github.com:EpitechPGE2-2025/G-OOP-400-MPL-4-1-raytracer-1.git

      - name: Push to Epitech (without .github/)
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git checkout -b epitech-sync
          git rm -r --cached .github/
          git commit -m "chore: remove mirror-only files for Epitech delivery"
          git push epitech epitech-sync:main --force
