name: Lint

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Run clang-format
        run: |
          find src -name "*.cpp" -o -name "*.hpp" | \
            xargs clang-format --dry-run --Werror 2>&1 | tee clang-format-report.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Upload clang-format report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-format-report
          path: clang-format-report.txt
          if-no-files-found: ignore

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ clang-tidy libcriterion-dev

      - name: Generate compile_commands.json
        run: cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          find src -name "*.cpp" | \
            xargs clang-tidy -p build 2>&1 | tee clang-tidy-report.txt || true

      - name: Upload clang-tidy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: clang-tidy-report.txt
          if-no-files-found: ignore
